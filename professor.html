//modo mestre

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escola de Heróis - Motor de Jogo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cormorant Garamond', serif; background-color: #1a0f08; color: #f4e4bc; margin: 0; }
    .font-title { font-family: 'Cinzel', serif; }
    .parchment { background-color: #3d2817 !important; border: 2px solid #8b6f47; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.9); }
    .input-medieval { background-color: #1a0f08; border: 1px solid #8b6f47; color: #f4e4bc; width: 100%; padding: 10px; border-radius: 4px; }
    .btn-medieval { background-color: #8b3a1f; border: 2px solid #c9a961; color: #f4e4bc; font-family: 'Cinzel', serif; cursor: pointer; }
    .btn-medieval:hover { background-color: #5c2410; }
    
    /* Barras de Status Sólidas */
    .bar-bg { background-color: #1a0f08; border: 1px solid #8b6f47; height: 10px; border-radius: 5px; overflow: hidden; }
    .bar-xp { background-color: #c9a961; height: 100%; transition: width 0.5s; }
    .bar-hp { background-color: #dc2626; height: 100%; transition: width 0.5s; }
  </style>
</head>
<body class="p-6">

  <header class="max-w-6xl mx-auto flex justify-between items-center mb-8 border-b-2 border-[#8b6f47] pb-4">
    <div>
      <h1 class="font-title text-3xl font-bold text-[#c9a961]">MESTRE DA ACADEMIA</h1>
      <p class="text-[#f4e4bc] italic">Gerindo a Lógica de Níveis</p>
    </div>
    <button id="btn-open-modal" class="btn-medieval px-6 py-2 rounded font-bold">+ Novo Aluno</button>
  </header>

  <main class="max-w-6xl mx-auto">
    <div id="heroes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="modal-action" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
    <div class="parchment w-full max-w-sm p-6 text-center">
      <h2 id="action-hero-name" class="font-title text-xl text-[#c9a961] mb-4">Nome do Herói</h2>
      
      <div class="space-y-4">
        <button onclick="alterarStatus('xp', 50)" class="btn-medieval w-full py-2 rounded">+ 50 XP (Tarefa)</button>
        <button onclick="alterarStatus('xp', 100)" class="btn-medieval w-full py-2 rounded">+ 100 XP (Projeto)</button>
        <button onclick="alterarStatus('hp', -20)" class="w-full py-2 bg-black border border-red-900 text-red-500 rounded font-bold">- 20 HP (Falta/Atraso)</button>
        <button onclick="alterarStatus('hp', 100)" class="w-full py-2 bg-emerald-900 border border-emerald-400 text-emerald-100 rounded">Recuperar Total (Cura)</button>
        <hr class="border-[#8b6f47] my-4">
        <button id="btn-close-action" class="text-sm underline">Fechar Painel</button>
      </div>
    </div>
  </div>

  <div id="modal-create" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
    <div class="parchment w-full max-w-md p-6">
      <h2 class="font-title text-2xl text-[#c9a961] text-center mb-6">Matricular Herói</h2>
      <form id="form-hero" class="space-y-4">
        <input type="text" id="input-matricula" class="input-medieval" required placeholder="Matrícula">
        <input type="text" id="input-name" class="input-medieval" required placeholder="Nome do Aluno">
        <input type="text" id="input-turma" class="input-medieval" required placeholder="Turma (ex: 7A)">
        <div class="flex gap-4">
          <button type="button" id="btn-cancel" class="flex-1 py-2 rounded border border-[#8b6f47]">Cancelar</button>
          <button type="submit" class="btn-medieval flex-1 py-2 rounded font-bold">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } 
    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQMpPjuznQAL_JhslkjXoWr2iKDLPYCSE",
      authDomain: "rpg-escola-de-herois.firebaseapp.com",
      projectId: "rpg-escola-de-herois",
      storageBucket: "rpg-escola-de-herois.firebasestorage.app",
      messagingSenderId: "951628766776",
      appId: "1:951628766776:web:ac6271633142f4ce5490cd"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let heroisLocais = [];
    let idHeroiSelecionado = null;

    // --- LÓGICA DE JOGO (ADS) ---
    const calcularNivel = (xp) => Math.floor(Math.sqrt(xp / 100)) + 1;
    
    // Função global para o mestre alterar status
    window.abrirPainelAcao = (id, nome) => {
      idHeroiSelecionado = id;
      document.getElementById('action-hero-name').textContent = nome;
      document.getElementById('modal-action').classList.remove('hidden');
    };

    window.alterarStatus = async (tipo, valor) => {
      const heroi = heroisLocais.find(h => h.id === idHeroiSelecionado);
      if (!heroi) return;

      let novoXP = heroi.xp;
      let novoHP = heroi.hp;

      if (tipo === 'xp') {
        novoXP = Math.max(0, heroi.xp + valor);
      } else {
        if (valor === 100 && tipo === 'hp') novoHP = 100; // Cura total
        else novoHP = Math.min(100, Math.max(0, heroi.hp + valor));
      }

      const novoLvl = calcularNivel(novoXP);

      await updateDoc(doc(db, "heroes", idHeroiSelecionado), {
        xp: novoXP,
        hp: novoHP,
        level: novoLvl
      });
      
      document.getElementById('modal-action').classList.add('hidden');
    };

    // --- INTERFACE ---
    onSnapshot(collection(db, "heroes"), (snapshot) => {
      const grid = document.getElementById('heroes-grid');
      grid.innerHTML = '';
      heroisLocais = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

      heroisLocais.forEach((hero) => {
        const card = document.createElement('div');
        card.className = "parchment p-5 flex flex-col gap-4";
        
        // Cálculo de progresso para a barra de XP (até o próximo nível)
        const nivelAtual = calcularNivel(hero.xp);
        const xpProximoNivel = Math.pow(nivelAtual, 2) * 100;
        const xpNivelAnterior = Math.pow(nivelAtual - 1, 2) * 100;
        const progressoXP = ((hero.xp - xpNivelAnterior) / (xpProximoNivel - xpNivelAnterior)) * 100;

        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="text-4xl">🧙</div>
            <div class="text-right">
              <div class="font-title text-[#c9a961] text-xs">NÍVEL</div>
              <div class="font-title text-2xl text-[#f4e4bc] font-bold">${hero.level}</div>
            </div>
          </div>
          
          <div>
            <h3 class="font-title text-lg text-[#f4e4bc] font-bold">${hero.name}</h3>
            <p class="text-xs text-[#8b6f47] mb-3">${hero.turma} | Matrícula: ${hero.matricula}</p>
            
            <div class="space-y-3">
              <div>
                <div class="flex justify-between text-[10px] font-title mb-1">
                  <span>ENERGIA (HP)</span><span>${hero.hp}%</span>
                </div>
                <div class="bar-bg"><div class="bar-hp" style="width: ${hero.hp}%"></div></div>
              </div>
              <div>
                <div class="flex justify-between text-[10px] font-title mb-1">
                  <span>EXPERIÊNCIA</span><span>${hero.xp} XP</span>
                </div>
                <div class="bar-bg"><div class="bar-xp" style="width: ${progressoXP}%"></div></div>
              </div>
            </div>
          </div>
          
          <button onclick="abrirPainelAcao('${hero.id}', '${hero.name}')" class="btn-medieval w-full py-2 rounded text-sm font-bold">
            REGISTRAR FEITO
          </button>
        `;
        grid.appendChild(card);
      });
    });

    // Modal de Criação
    document.getElementById('btn-open-modal').addEventListener('click', () => document.getElementById('modal-create').classList.remove('hidden'));
    document.getElementById('btn-cancel').addEventListener('click', () => document.getElementById('modal-create').classList.add('hidden'));
    document.getElementById('btn-close-action').addEventListener('click', () => document.getElementById('modal-action').classList.add('hidden'));

    document.getElementById('form-hero').addEventListener('submit', async (e) => {
      e.preventDefault();
      const novo = {
        matricula: document.getElementById('input-matricula').value,
        name: document.getElementById('input-name').value,
        turma: document.getElementById('input-turma').value,
        level: 1, xp: 0, hp: 100
      };
      await addDoc(collection(db, "heroes"), novo);
      document.getElementById('modal-create').classList.add('hidden');
    });
  </script>
</body>
</html>
