<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Herói - Escola de Heróis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cormorant Garamond', serif; background-color: #1a0f08; color: #f4e4bc; margin: 0; }
    .font-title { font-family: 'Cinzel', serif; }
    .parchment { background-color: #3d2817 !important; border: 2px solid #8b6f47; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.9); }
    .input-medieval { background-color: #1a0f08; border: 1px solid #8b6f47; color: #f4e4bc; width: 100%; padding: 12px; border-radius: 4px; text-align: center; font-size: 1.2rem; }
    .btn-medieval { background-color: #8b3a1f; border: 2px solid #c9a961; color: #f4e4bc; font-family: 'Cinzel', serif; cursor: pointer; }
    .btn-medieval:hover { background-color: #5c2410; }
    
    .bar-bg { background-color: #1a0f08; border: 1px solid #8b6f47; height: 14px; border-radius: 7px; overflow: hidden; }
    .bar-xp { background-color: #c9a961; height: 100%; transition: width 0.8s ease-in-out; }
    .bar-hp { background-color: #dc2626; height: 100%; transition: width 0.8s ease-in-out; }
    .bar-mp { background-color: #2563eb; height: 100%; transition: width 0.8s ease-in-out; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div id="login-screen" class="parchment w-full max-w-sm p-8 text-center">
    <div class="text-6xl mb-4">🛡️</div>
    <h1 class="font-title text-2xl text-[#c9a961] mb-6">IDENTIFIQUE-SE, HERÓI</h1>
    <form id="form-login" class="space-y-4">
      <input type="text" id="login-matricula" class="input-medieval" required placeholder="Sua Matrícula">
      <button type="submit" class="btn-medieval w-full py-3 rounded font-bold text-lg">VER MINHA FICHA</button>
    </form>
    <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Herói não encontrado em nossos pergaminhos.</p>
  </div>

  <div id="student-dashboard" class="hidden w-full max-w-2xl fade-in">
    <div class="parchment p-8 relative overflow-hidden">
      <div class="absolute -top-10 -right-10 text-9xl opacity-5">⚔️</div>
      
      <div class="flex flex-col md:flex-row gap-8 items-center md:items-start relative z-10">
        <div class="text-center">
          <div id="display-avatar" class="text-9xl mb-2">🧙</div>
          <div class="bg-[#1a0f08] border-2 border-[#c9a961] p-3 rounded">
            <div class="font-title text-[#c9a961] text-sm">NÍVEL</div>
            <div id="display-level" class="font-title text-5xl text-[#f4e4bc] font-black">1</div>
          </div>
        </div>

        <div class="flex-1 w-full space-y-6">
          <div>
            <h2 id="display-name" class="font-title text-4xl text-[#c9a961] mb-1">NOME DO HERÓI</h2>
            <p id="display-turma" class="text-[#8b6f47] italic text-lg">Turma</p>
          </div>

          <div class="space-y-4">
            <div>
              <div class="flex justify-between text-xs font-title mb-1">
                <span>ENERGIA VITAL (HP)</span><span id="label-hp">100/100</span>
              </div>
              <div class="bar-bg"><div id="bar-hp" class="bar-hp" style="width: 100%"></div></div>
            </div>

            <div>
              <div class="flex justify-between text-xs font-title mb-1 text-blue-400">
                <span>MANA DE ESTUDO (MP)</span><span id="label-mp">50/50</span>
              </div>
              <div class="bar-bg"><div id="bar-mp" class="bar-mp" style="width: 100%"></div></div>
            </div>

            <div>
              <div class="flex justify-between text-xs font-title mb-1 text-amber-500">
                <span>EXPERIÊNCIA ACUMULADA</span><span id="label-xp">0 XP</span>
              </div>
              <div class="bar-bg"><div id="bar-xp" class="bar-xp" style="width: 0%"></div></div>
            </div>
          </div>

          <button onclick="window.location.reload()" class="text-[#8b6f47] underline text-sm mt-4 hover:text-[#c9a961]">
            Sair da Ficha
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQMpPjuznQAL_JhslkjXoWr2iKDLPYCSE",
      authDomain: "rpg-escola-de-herois.firebaseapp.com",
      projectId: "rpg-escola-de-herois",
      storageBucket: "rpg-escola-de-herois.firebasestorage.app",
      messagingSenderId: "951628766776",
      appId: "1:951628766776:web:ac6271633142f4ce5490cd"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const calcularNivel = (xp) => Math.floor(Math.sqrt(xp / 100)) + 1;

    const formLogin = document.getElementById('form-login');
    const loginScreen = document.getElementById('login-screen');
    const dashboard = document.getElementById('student-dashboard');
    const errorMsg = document.getElementById('login-error');

    formLogin.addEventListener('submit', (e) => {
      e.preventDefault();
      const matricula = document.getElementById('login-matricula').value.trim();
      
      // Busca em tempo real pelo herói com essa matrícula
      const q = query(collection(db, "heroes"), where("matricula", "==", matricula));
      
      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          errorMsg.classList.remove('hidden');
        } else {
          const hero = snapshot.docs[0].data();
          loginScreen.classList.add('hidden');
          dashboard.classList.remove('hidden');
          atualizarInterface(hero);
        }
      });
    });

    function atualizarInterface(hero) {
      document.getElementById('display-name').textContent = hero.name.toUpperCase();
      document.getElementById('display-turma').textContent = `Turma: ${hero.turma}`;
      document.getElementById('display-level').textContent = hero.level;
      document.getElementById('display-avatar').textContent = hero.avatar || "🧙";
      
      // HP e MP
      document.getElementById('label-hp').textContent = `${hero.hp}/100`;
      document.getElementById('bar-hp').style.width = `${hero.hp}%`;
      document.getElementById('label-mp').textContent = `${hero.mp}/50`;
      document.getElementById('bar-mp').style.width = `${(hero.mp/50)*100}%`;

      // Lógica de Barra de XP
      const nivelAtual = calcularNivel(hero.xp);
      const xpProximoNivel = Math.pow(nivelAtual, 2) * 100;
      const xpNivelAnterior = Math.pow(nivelAtual - 1, 2) * 100;
      const progressoXP = ((hero.xp - xpNivelAnterior) / (xpProximoNivel - xpNivelAnterior)) * 100;
      
      document.getElementById('label-xp').textContent = `${hero.xp} XP`;
      document.getElementById('bar-xp').style.width = `${progressoXP}%`;
    }
  </script>
</body>
</html>
