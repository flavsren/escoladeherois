<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Jornada - Escola de Heróis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cormorant Garamond', serif; background-color: #1a0f08; color: #f4e4bc; margin: 0; }
        .font-title { font-family: 'Cinzel', serif; }
        .parchment { background-color: #3d2817 !important; border: 2px solid #8b6f47; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.9); }
        
        /* Barras de Status */
        .bar-bg { background-color: #1a0f08; border: 1px solid #8b6f47; height: 16px; border-radius: 8px; overflow: hidden; }
        .bar-xp { background-color: #c9a961; height: 100%; transition: width 1s ease-in-out; }
        .bar-hp { background-color: #dc2626; height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loading" class="text-[#c9a961] font-title animate-pulse">Buscando seus registros na nuvem...</div>

    <main id="ficha" class="hidden w-full max-w-2xl parchment p-8 md:p-12 relative">
        <div class="flex flex-col md:flex-row gap-8 items-center">
            
            <div class="text-center">
                <div id="avatar" class="text-9xl mb-4">🧙</div>
                <div class="inline-block bg-[#1a0f08] border-2 border-[#c9a961] px-6 py-2 rounded">
                    <div class="font-title text-[#c9a961] text-xs">NÍVEL</div>
                    <div id="level" class="font-title text-5xl text-[#f4e4bc] font-black">1</div>
                </div>
            </div>

            <div class="flex-1 w-full space-y-6">
                <div>
                    <h1 id="nome" class="font-title text-4xl text-[#c9a961] leading-tight">HERÓI</h1>
                    <p id="info" class="text-[#8b6f47] italic font-bold">CARREGANDO...</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-xs font-title mb-1">
                            <span>ENERGIA VITAL (HP)</span><span id="txt-hp">100%</span>
                        </div>
                        <div class="bar-bg"><div id="bar-hp" class="bar-hp" style="width: 100%"></div></div>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs font-title mb-1 text-[#c9a961]">
                            <span>EXPERIÊNCIA (XP)</span><span id="txt-xp">0</span>
                        </div>
                        <div class="bar-bg"><div id="bar-xp" class="bar-xp" style="width: 0%"></div></div>
                        <p id="prox-nivel" class="text-[10px] text-[#8b6f47] mt-1 text-right italic font-bold"></p>
                    </div>
                </div>

                <button onclick="logout()" class="text-[#8b6f47] hover:text-[#c9a961] underline text-sm pt-4 transition-colors">
                    Sair da Jornada
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } 
        from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQMpPjuznQAL_JhslkjXoWr2iKDLPYCSE",
            authDomain: "rpg-escola-de-herois.firebaseapp.com",
            projectId: "rpg-escola-de-herois",
            storageBucket: "rpg-escola-de-herois.firebasestorage.app",
            messagingSenderId: "951628766776",
            appId: "1:951628766776:web:ac6271633142f4ce5490cd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. VERIFICAÇÃO DE ACESSO
        const matriculaLogada = localStorage.getItem('heroi_logado');

        if (!matriculaLogada) {
            window.location.href = 'index.html'; // Se não tiver matrícula, volta pro portal
        } else {
            conectarAoFirebase(matriculaLogada);
        }

        function conectarAoFirebase(matricula) {
            const q = query(collection(db, "heroes"), where("matricula", "==", matricula));
            
            // ESCUTA EM TEMPO REAL
            onSnapshot(q, (snapshot) => {
                if (!snapshot.empty) {
                    const hero = snapshot.docs[0].data();
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('ficha').classList.remove('hidden');
                    atualizarFicha(hero);
                } else {
                    alert("Dados não encontrados. Você será desconectado.");
                    logout();
                }
            });
        }

        function atualizarFicha(hero) {
            document.getElementById('nome').textContent = hero.name.toUpperCase();
            document.getElementById('info').textContent = `TURMA ${hero.turma} | MATRÍCULA ${hero.matricula}`;
            document.getElementById('level').textContent = hero.level;
            document.getElementById('avatar').textContent = hero.avatar || "🧙";
            
            // Atualizar HP
            document.getElementById('txt-hp').textContent = `${hero.hp}%`;
            document.getElementById('bar-hp').style.width = `${hero.hp}%`;

            // Lógica de XP para a barra
            const lvl = hero.level;
            const xpAtual = hero.xp;
            const xpNecessarioDesteNivel = Math.pow(lvl - 1, 2) * 100;
            const xpProximoNivelTotal = Math.pow(lvl, 2) * 100;
            
            const progressoNaBarra = ((xpAtual - xpNecessarioDesteNivel) / (xpProximoNivelTotal - xpNecessarioDesteNivel)) * 100;
            
            document.getElementById('txt-xp').textContent = `${xpAtual} XP`;
            document.getElementById('bar-xp').style.width = `${progressoNaBarra}%`;
            document.getElementById('prox-nivel').textContent = `Faltam ${xpProximoNivelTotal - xpAtual} XP para o Nível ${lvl + 1}`;
        }

        window.logout = () => {
            localStorage.removeItem('heroi_logado');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
