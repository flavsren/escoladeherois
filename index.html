<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola de Heróis - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #1a0f08; /* Fundo sólido ultra escuro */
            color: #f4e4bc;
            margin: 0;
            overflow: hidden;
        }

        .font-title { font-family: 'Cinzel', serif; }

        /* Janela de Login Central */
        .parchment {
            background-color: #3d2817; /* Marrom sólido */
            border: 2px solid #8b6f47;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .input-medieval {
            background-color: #1a0f08;
            border: 1px solid #8b6f47;
            color: #f4e4bc;
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        .input-medieval:focus { border-color: #c9a961; }

        .btn-medieval {
            background-color: #8b3a1f;
            border: 2px solid #c9a961;
            color: #f4e4bc;
            font-family: 'Cinzel', serif;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-medieval:hover { background-color: #5c2410; transform: scale(1.02); }

        /* Botão do Professor Minimalista */
        .teacher-access {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.4;
            transition: opacity 0.3s;
            text-decoration: none;
            color: #8b6f47;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .teacher-access:hover { opacity: 1; color: #c9a961; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="parchment w-full max-w-sm p-10 text-center">
        <div class="text-7xl mb-6">🛡️</div>
        <h1 class="font-title text-3xl text-[#c9a961] mb-2">ESCOLA DE HERÓIS</h1>
        <p class="text-[#f4e4bc] italic mb-8">Saudações, herói. Identifique-se para prosseguir.</p>

        <form id="form-portal" class="space-y-4">
            <input type="text" id="matricula" class="input-medieval" required placeholder="Sua Matrícula">
            <button type="submit" class="btn-medieval w-full py-3 rounded font-bold text-lg">
                ENTRAR NA JORNADA
            </button>
        </form>
        
        <p id="msg-erro" class="text-red-500 text-sm mt-4 hidden">Matrícula não encontrada.</p>
    </main>

    <a href="professor.html" class="teacher-access font-title">
        <span>MODO MESTRE</span>
        <div class="p-2 border border-[#8b6f47] rounded-full">🗝️</div>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } 
        from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQMpPjuznQAL_JhslkjXoWr2iKDLPYCSE",
            authDomain: "rpg-escola-de-herois.firebaseapp.com",
            projectId: "rpg-escola-de-herois",
            storageBucket: "rpg-escola-de-herois.firebasestorage.app",
            messagingSenderId: "951628766776",
            appId: "1:951628766776:web:ac6271633142f4ce5490cd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('form-portal');
        const erro = document.getElementById('msg-erro');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const matriculaInput = document.getElementById('matricula').value.trim();
            
            // Consultar se a matrícula existe
            const q = query(collection(db, "heroes"), where("matricula", "==", matriculaInput));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                // Salva a matrícula no navegador para a página do aluno saber quem é
                localStorage.setItem('heroi_logado', matriculaInput);
                // Redireciona para a página da ficha
                window.location.href = 'aluno.html';
            } else {
                erro.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
